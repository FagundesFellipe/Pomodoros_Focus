# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: run-tests
        name: Run tests with coverage
        entry: npm run test:coverage
        language: system
        pass_filenames: false
        always_run: true
      - id: block-main
        name: Block direct commits to main/master
        entry: bash -c 'branch=$(git symbolic-ref --short HEAD); if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then echo "❌ Commits diretos na main bloqueados."; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
